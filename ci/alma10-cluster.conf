# xCAT-test cluster config (default.conf format) for the AlmaLinux 10 daily.
#
# Consumed on the management node by:  xcattest -f <this file> -b alma10_x86_daily.bundle
# Plain `-f` (no :System) => xcattest APPLIES this file to the xCAT DB:
#   [Table_*]    -> chtab
#   [Object_*]   -> chdef -t <type> -o <Name>
#   [System]     -> $$VAR substitution + __GETNODEATTR(node,attr)__ in test cases
# so the service node (xcat01-sn) and compute node (xcat01-cn) get defined with full
# VM attributes, after which setup_vm/SN_setup_case/reg_linux_*_hierarchy provision them.
#
# cluster-test.sh substitutes @ISO@ with the AlmaLinux 10 DVD path staged on the MN.

[Table_passwd]
key=system
username=root
password=cluster

[Table_site]
key=domain
value=xcat.versatushpc.com.br
key=master
value=192.168.201.20
key=nameservers
value=192.168.201.20
key=forwarders
value=1.1.1.1
key=consoleondemand
value=yes

[Object_node]    #SN
Name=xcat01-sn
    arch=x86_64
    cons=kvm
    groups=all
    mgt=kvm
    netboot=xnba
    serialflow=hard
    serialport=0
    serialspeed=115200
    vmcpus=4
    vmhost=192.168.201.1
    vmmemory=10240
    vmnicnicmodel=e1000
    vmnics=virbr1,virbr1,virbr1
    vmothersetting=cpumode:host-passthrough
    vmstorage=dir:///var/lib/libvirt/images/
    vmstoragecache=unsafe
    os=alma10.1
    ip=192.168.201.21

[Object_node]    #CN
Name=xcat01-cn
    arch=x86_64
    cons=kvm
    groups=all
    mgt=kvm
    netboot=xnba
    serialflow=hard
    serialport=0
    serialspeed=115200
    vmcpus=4
    vmhost=192.168.201.1
    vmmemory=10240
    vmnicnicmodel=e1000
    vmnics=virbr1,virbr1,virbr1
    vmothersetting=cpumode:host-passthrough
    vmstorage=dir:///var/lib/libvirt/images/
    vmstoragecache=unsafe
    os=alma10.1
    ip=192.168.201.22

[System]
MN=xcat01-mn
SN=xcat01-sn
CN=xcat01-cn
SNCN=xcat01-cn
OS=alma10.1
ISO=@ISO@
NETBOOTDIR=/opt/xcat/share/xcat/netboot/rh
SECONDNIC=ens4
THIRDNIC=ens5
GATEWAY=192.168.201.1
STATELITE=alma10.1-x86_64-statelite-compute
extntpserversip=192.168.201.20
XCAT_DATABASE=SQLite
