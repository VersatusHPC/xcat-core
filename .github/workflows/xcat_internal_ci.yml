name: xCAT Internal CI

on:
  pull_request:
  workflow_dispatch:
    inputs:
      keep_vms:
        description: "Keep test VMs after completion (for debugging)"
        type: boolean
        default: false

jobs:
  build-and-test:
    name: "Build & Test (${{ matrix.distro }} ${{ matrix.arch }})"
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── x86_64 on rome01 ───────────────────────────────────────────
          - distro: EL9
            arch: x86_64
            runner: xcat-rhel-x86_64
            type: rpm
            elver: 9
          - distro: EL10
            arch: x86_64
            runner: xcat-rhel-x86_64
            type: rpm
            elver: 10
          - distro: Ubuntu-22.04
            arch: x86_64
            runner: xcat-rhel-x86_64
            type: deb
            ubuntu_image: docker.io/library/ubuntu:22.04
            ubuntu_tag: "22.04"
          - distro: Ubuntu-24.04
            arch: x86_64
            runner: xcat-rhel-x86_64
            type: deb
            ubuntu_image: docker.io/library/ubuntu:24.04
            ubuntu_tag: "24.04"
          # ── ppc64le on power ───────────────────────────────────────────
          - distro: EL9
            arch: ppc64le
            runner: xcat-alma-ppc64le
            type: rpm
            elver: 9
          - distro: EL10
            arch: ppc64le
            runner: xcat-alma-ppc64le
            type: rpm
            elver: 10
          - distro: Ubuntu-22.04
            arch: ppc64le
            runner: xcat-alma-ppc64le
            type: deb
            ubuntu_image: docker.io/ppc64le/ubuntu:22.04
            ubuntu_tag: "22.04"
          - distro: Ubuntu-24.04
            arch: ppc64le
            runner: xcat-alma-ppc64le
            type: deb
            ubuntu_image: docker.io/ppc64le/ubuntu:24.04
            ubuntu_tag: "24.04"

    steps:
      # ── Common setup ────────────────────────────────────────────────────
      - name: Set up isolated workspace
        run: |
          WORKDIR="/var/tmp/xcat3-ci/${{ matrix.distro }}-${{ matrix.arch }}-${{ github.run_id }}"
          sudo rm -rf "$WORKDIR"
          sudo mkdir -p "$WORKDIR"
          sudo chown "$(id -u):$(id -g)" "$WORKDIR"
          echo "WORKDIR=$WORKDIR" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ matrix.distro }}-${{ matrix.arch }}

      - name: Copy source to workspace
        run: cp -a "${{ matrix.distro }}-${{ matrix.arch }}/." "$WORKDIR/"

      - name: Prepare build environment
        working-directory: ${{ env.WORKDIR }}
        run: |
          git rev-parse HEAD > Gitinfo
          echo "snap$(date +%Y%m%d%H%M)" > Release
          echo "Release set to: $(cat Release)"

      # ── RPM: Build ─────────────────────────────────────────────────────
      - name: Install RPM build dependencies
        if: matrix.type == 'rpm'
        run: |
          sudo dnf install -y \
            mock createrepo_c perl perl-core perl-generators \
            perl-File-Slurper perl-Parallel-ForkManager \
            perl-Pod-Usage perl-autodie perl-Carp \
            qemu-img virt-install libvirt genisoimage openssh-clients \
            curl rpm-build rsync bats 2>&1 | tail -5
          sudo usermod -aG mock "$(whoami)" 2>/dev/null || true
          sudo systemctl enable --now libvirtd

      - name: Detect mock target
        if: matrix.type == 'rpm'
        id: target
        run: |
          DISTRO=$(. /etc/os-release && echo "$ID")
          case "$DISTRO" in
            almalinux) DISTRO="alma" ;;
            rocky)     DISTRO="rocky" ;;
          esac
          TARGET="${DISTRO}+epel-${{ matrix.elver }}-${{ matrix.arch }}"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "Mock target: $TARGET"

      - name: Build RPMs
        if: matrix.type == 'rpm'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo mkdir -p "$WORKDIR/rpmbuild/SOURCES"
          sudo HOME="$WORKDIR" perl buildrpms.pl \
            --target "${{ steps.target.outputs.target }}" \
            --mock-uniqueext "${{ matrix.distro }}-${{ matrix.arch }}" \
            --force

      - name: Verify RPMs built
        if: matrix.type == 'rpm'
        working-directory: ${{ env.WORKDIR }}
        run: |
          TARGET="${{ steps.target.outputs.target }}"
          RPM_COUNT=$(find "dist/$TARGET/rpms" -name "*.rpm" 2>/dev/null | wc -l)
          echo "Built $RPM_COUNT RPMs in dist/$TARGET/rpms/"
          ls -la "dist/$TARGET/rpms/"*.rpm 2>/dev/null | head -20
          test "$RPM_COUNT" -gt 0 || { echo "ERROR: no RPMs produced"; exit 1; }

      # ── RPM: Test (harness) ────────────────────────────────────────────
      - name: Create test environment
        if: matrix.type == 'rpm'
        id: env
        working-directory: ${{ env.WORKDIR }}
        run: |
          RUN_ID="${{ github.run_id }}-${{ matrix.distro }}-${{ matrix.arch }}"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          MN_IP=$(sudo bash ci/create-test-env.sh --run-id "$RUN_ID")
          echo "mn_ip=$MN_IP" >> "$GITHUB_OUTPUT"
          echo "MN ready at $MN_IP"

      - name: Copy repo to test environment
        if: matrix.type == 'rpm'
        working-directory: ${{ env.WORKDIR }}
        run: |
          TARGET="${{ steps.target.outputs.target }}"
          sudo bash ci/copy-repo-to-env.sh \
            --repo-path "dist/$TARGET/rpms" \
            --mn-ip "${{ steps.env.outputs.mn_ip }}"

      - name: Initialize test harness
        if: matrix.type == 'rpm'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo bash ci/init-harness.sh \
            --mn-ip "${{ steps.env.outputs.mn_ip }}" \
            --harness unit-smoke

      - name: Run test harness
        if: matrix.type == 'rpm'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo bash ci/run-harness.sh \
            --mn-ip "${{ steps.env.outputs.mn_ip }}" \
            --harness unit-smoke

      - name: Teardown test environment
        if: always() && matrix.type == 'rpm'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo bash ci/teardown-test-env.sh \
            --run-id "${{ steps.env.outputs.run_id || '' }}" 2>/dev/null || true

      # ── RPM: Upload validated artifacts ────────────────────────────────
      - name: Upload RPMs
        if: always() && matrix.type == 'rpm'
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.distro }}-${{ matrix.arch }}
          path: ${{ env.WORKDIR }}/dist/*/rpms/*.rpm
          retention-days: 7
          if-no-files-found: warn

      # ── DEB: Build ─────────────────────────────────────────────────────
      - name: Install DEB build dependencies
        if: matrix.type == 'deb'
        run: sudo dnf install -y podman 2>&1 | tail -3

      - name: Build DEBs
        if: matrix.type == 'deb'
        working-directory: ${{ env.WORKDIR }}
        run: |
          DIST_DIR="dist/ubuntu-${{ matrix.ubuntu_tag }}-${{ matrix.arch }}"
          sudo mkdir -p "$DIST_DIR"
          # Create clean source tarball (no .git, no dist/)
          git archive HEAD | sudo tee /tmp/xcat-src.tar > /dev/null
          sudo podman run --rm \
            -v "/tmp/xcat-src.tar:/tmp/xcat-src.tar:Z" \
            -v "${WORKDIR}/${DIST_DIR}:/xcatbuild:Z" \
            -e BUILDALL=1 -e GPGSIGN=0 \
            ${{ matrix.ubuntu_image }} \
            bash -c '
              set -e
              export DEBIAN_FRONTEND=noninteractive
              apt-get update -qq
              apt-get install -y -qq reprepro devscripts debhelper git quilt \
                libsoap-lite-perl libdbi-perl libjson-perl libcgi-pm-perl 2>&1 | tail -3
              mkdir -p /tmp/xcat-core && cd /tmp/xcat-core
              tar xf /tmp/xcat-src.tar
              ./build-ubunturepo -c UP=0 BUILDALL=1 GPGSIGN=0 DEST=/xcatbuild
            '
          echo "DEB build output:"
          ls -la "${DIST_DIR}/" | head -10
          ls -la "${DIST_DIR}/debsxcat-core/xcat-core/" 2>/dev/null | head -5 || echo "WARN: repo dir not found"

      # ── DEB: Test ──────────────────────────────────────────────────────
      - name: Create test environment (Ubuntu)
        if: matrix.type == 'deb'
        id: deb-env
        working-directory: ${{ env.WORKDIR }}
        run: |
          RUN_ID="${{ github.run_id }}-${{ matrix.distro }}-${{ matrix.arch }}"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          MN_IP=$(sudo bash ci/create-test-env.sh --run-id "$RUN_ID" --os-family ubuntu)
          echo "mn_ip=$MN_IP" >> "$GITHUB_OUTPUT"
          echo "MN ready at $MN_IP"

      - name: Copy repo to test environment (Ubuntu)
        if: matrix.type == 'deb'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo bash ci/copy-repo-to-env.sh \
            --pkg-type deb \
            --repo-path "dist/ubuntu-${{ matrix.ubuntu_tag }}-${{ matrix.arch }}/debsxcat-core/xcat-core" \
            --mn-ip "${{ steps.deb-env.outputs.mn_ip }}"

      - name: Initialize test harness (Ubuntu)
        if: matrix.type == 'deb'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo bash ci/init-harness.sh \
            --mn-ip "${{ steps.deb-env.outputs.mn_ip }}" \
            --harness unit-smoke

      - name: Run test harness (Ubuntu)
        if: matrix.type == 'deb'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo bash ci/run-harness.sh \
            --mn-ip "${{ steps.deb-env.outputs.mn_ip }}" \
            --harness unit-smoke

      - name: Teardown test environment (Ubuntu)
        if: always() && matrix.type == 'deb'
        working-directory: ${{ env.WORKDIR }}
        run: |
          sudo bash ci/teardown-test-env.sh \
            --run-id "${{ steps.deb-env.outputs.run_id || '' }}" 2>/dev/null || true

      - name: Upload DEBs
        if: always() && matrix.type == 'deb'
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro }}-${{ matrix.arch }}
          path: ${{ env.WORKDIR }}/dist/ubuntu-*/debsxcat-core/xcat-core/*.deb
          retention-days: 7
          if-no-files-found: warn

      # ── Cleanup ────────────────────────────────────────────────────────
      - name: Clean up workspace
        if: always()
        run: sudo rm -rf "$WORKDIR"
