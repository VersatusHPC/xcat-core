name: xCAT Internal CI

on:
  workflow_dispatch:

jobs:
  build-and-test:
    name: "Build & Test (${{ matrix.target }} ${{ matrix.arch }})"
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: el9
            arch: x86_64
            runner: xcat-rhel-x86_64
          - target: el10
            arch: x86_64
            runner: xcat-rhel-x86_64
          - target: ubuntu-22.04
            arch: x86_64
            runner: xcat-rhel-x86_64
          - target: ubuntu-24.04
            arch: x86_64
            runner: xcat-rhel-x86_64
          - target: ubuntu-26.04
            arch: x86_64
            runner: xcat-rhel-x86_64
          - target: el9
            arch: ppc64le
            runner: xcat-alma-ppc64le
          - target: el10
            arch: ppc64le
            runner: xcat-alma-ppc64le
          - target: ubuntu-22.04
            arch: ppc64le
            runner: xcat-alma-ppc64le
          - target: ubuntu-24.04
            arch: ppc64le
            runner: xcat-alma-ppc64le
          - target: ubuntu-26.04
            arch: ppc64le
            runner: xcat-alma-ppc64le

    steps:
      - name: Clean workspace
        run: sudo rm -rf "${{ github.workspace }}/artifacts" || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and Test in VM
        run: |
          sudo bash ci/run-ci.sh \
            --target "${{ matrix.target }}" \
            --run-id "${{ github.run_id }}-${{ matrix.target }}-${{ matrix.arch }}" \
            --artifact-dir "${{ github.workspace }}/artifacts"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.target }}-${{ matrix.arch }}
          path: artifacts/
          retention-days: 7
          if-no-files-found: warn
