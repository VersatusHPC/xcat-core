# xcat-core CI project config (company-ci shared library schema).
# Reference only: the alma10 daily is a self-contained pipeline defined in
# the Jenkinsfile, so the generic company-ci build/package/publish
# stages are not used here and are disabled below. Kept for documentation / in case
# xcat-core later adopts companyPipeline().
languages: []

preflight:
  image: ""
  format: []
  lint: []
  test: []

container_builds: []

rpm:
  enabled: false
  targets: []
  arches: []

apt:
  enabled: false
  targets: []
  arches: []

publish:
  enabled: false
  require_tag: true
  require_approval: true

change_policy:
  docs_only_paths:
    - "docs/**"
    - "**/*.md"
  source_paths:
    - "perl-xCAT/**"
    - "xCAT-server/**"
    - "xCAT-client/**"
    - "xCAT/**"
    - "xCAT-test/**"
  packaging_paths:
    - "**/*.spec"
    - "buildrpms.pl"
